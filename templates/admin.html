<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BANKXY | Admin Dashboard</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    colors: {
                        primary: '#06b6d4',
                        secondary: '#3b82f6',
                        darkbg: '#0f172a',
                        cardbg: '#1e293b',
                    }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; background-color: #0f172a; color: #f8fafc; }
        
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #0f172a; }
        ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #475569; }

        .loader {
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid #06b6d4;
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col hidden" id="body-content">
    
    <!-- Navbar -->
    <nav class="glass-panel sticky top-0 z-40 px-6 py-4 flex justify-between items-center shadow-lg">
        <div class="flex items-center gap-2">
            <i class="fa-solid fa-shield-halved text-2xl text-primary"></i>
            <span class="text-xl font-bold tracking-wider text-white">BANKXY <span class="text-xs text-primary bg-primary/20 px-2 py-0.5 rounded-full ml-1">ADMIN</span></span>
        </div>
        
        <div class="flex items-center gap-4">
            <span id="admin-email" class="text-sm font-medium text-slate-300"></span>
            <button onclick="handleLogout()" class="text-sm font-medium text-red-400 hover:text-red-300 transition-colors">
                <i class="fa-solid fa-arrow-right-from-bracket mr-1"></i> Logout
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow p-6 w-full max-w-7xl mx-auto space-y-6">
        
        <div class="flex justify-between items-end mb-6">
            <div>
                <h1 class="text-3xl font-bold text-white">System Overview</h1>
                <p class="text-slate-400 mt-1">Real-time metrics and health monitoring.</p>
            </div>
            <button onclick="loadDashboardData()" class="bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded-lg text-sm border border-slate-700 flex items-center gap-2 transition-colors">
                <i class="fa-solid fa-rotate-right"></i> Refresh
            </button>
        </div>

        <!-- Top Metrics Cards -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6">
            <div class="glass-panel p-6 rounded-2xl relative overflow-hidden group">
                <div class="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition-opacity">
                    <i class="fa-solid fa-users text-6xl"></i>
                </div>
                <p class="text-slate-400 text-sm font-medium mb-1">Total Users</p>
                <h3 class="text-4xl font-bold text-white" id="stat-users">0</h3>
            </div>
            
            <div class="glass-panel p-6 rounded-2xl relative overflow-hidden group">
                <div class="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition-opacity">
                    <i class="fa-solid fa-file-pdf text-6xl"></i>
                </div>
                <p class="text-slate-400 text-sm font-medium mb-1">Total Conversions</p>
                <h3 class="text-4xl font-bold text-white" id="stat-conversions">0</h3>
            </div>

            <div class="glass-panel p-6 rounded-2xl relative overflow-hidden group">
                <div class="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition-opacity">
                    <i class="fa-solid fa-check-circle text-6xl text-green-500"></i>
                </div>
                <p class="text-slate-400 text-sm font-medium mb-1">Success Rate</p>
                <h3 class="text-4xl font-bold text-green-400" id="stat-success-rate">0%</h3>
            </div>

            <div class="glass-panel p-6 rounded-2xl relative overflow-hidden group border border-red-500/20 bg-red-900/10">
                <div class="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition-opacity">
                    <i class="fa-solid fa-triangle-exclamation text-6xl text-red-500"></i>
                </div>
                <p class="text-red-300 text-sm font-medium mb-1">Total Errors</p>
                <h3 class="text-4xl font-bold text-red-400" id="stat-errors">0</h3>
            </div>
        </div>

        <!-- Charts Row -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <!-- Conversions Chart -->
            <div class="glass-panel p-6 rounded-2xl">
                <h3 class="text-lg font-semibold text-white mb-4">Conversions Over Time (Last 7 Days)</h3>
                <div class="w-full h-64">
                    <canvas id="conversionChart"></canvas>
                </div>
            </div>

            <!-- Bank Usage Chart -->
            <div class="glass-panel p-6 rounded-2xl">
                <h3 class="text-lg font-semibold text-white mb-4">Bank Parser Usage</h3>
                <div class="w-full h-64 flex justify-center">
                    <canvas id="bankChart"></canvas>
                </div>
            </div>
        </div>

        <!-- Activity & Errors Row -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <!-- Recent Activity Table -->
            <div class="glass-panel p-6 rounded-2xl overflow-hidden flex flex-col h-[400px]">
                <h3 class="text-lg font-semibold text-white mb-4 flex-shrink-0">Recent Activity</h3>
                <div class="overflow-y-auto flex-grow pr-2">
                    <table class="w-full text-sm text-left text-slate-300">
                        <thead class="text-xs text-slate-400 uppercase bg-slate-800/50 sticky top-0">
                            <tr>
                                <th class="px-4 py-3">Time</th>
                                <th class="px-4 py-3">Bank</th>
                                <th class="px-4 py-3">User</th>
                                <th class="px-4 py-3 text-right">Status</th>
                            </tr>
                        </thead>
                        <tbody id="activity-table-body" class="divide-y divide-slate-700/50">
                            <!-- Populated via JS -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- Recent Errors Table -->
            <div class="glass-panel p-6 rounded-2xl overflow-hidden flex flex-col h-[400px] border border-red-500/20">
                <h3 class="text-lg font-semibold text-red-400 mb-4 flex-shrink-0"><i class="fa-solid fa-bug mr-2"></i>Recent Errors</h3>
                <div class="overflow-y-auto flex-grow pr-2">
                    <table class="w-full text-sm text-left text-slate-300">
                        <thead class="text-xs text-slate-400 uppercase bg-slate-800/50 sticky top-0">
                            <tr>
                                <th class="px-4 py-3">Time</th>
                                <th class="px-4 py-3">Bank</th>
                                <th class="px-4 py-3">Error</th>
                            </tr>
                        </thead>
                        <tbody id="error-table-body" class="divide-y divide-slate-700/50">
                            <!-- Populated via JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </main>

    <script>
        // --- Real Firebase Auth Setup ---
        const firebaseConfig = {
            apiKey: "AIzaSyD604riyNRDDWdqPArwR8VPdVC37IqSx38",
            authDomain: "bankxy.firebaseapp.com",
            projectId: "bankxy",
            storageBucket: "bankxy.firebasestorage.app",
            messagingSenderId: "678110051774",
            appId: "1:678110051774:web:4bcf4e54aee7b4f26ecdef",
            measurementId: "G-7TRFW31301"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // Store charts to update them
        let convChartInstance = null;
        let bankChartInstance = null;
        let adminToken = null;

        // Security check on load
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                // Not authenticated, redirect to login
                window.location.href = '/'; 
                return;
            }
            
            // Allow if backend validates Firestore 'admin' role
            try {
                const token = await user.getIdToken();
                const res = await fetch('/api/check_admin', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const data = await res.json();
                
                if (data.isAdmin) {
                    adminToken = token;
                    document.getElementById('body-content').classList.remove('hidden');
                    document.getElementById('admin-email').textContent = user.email;
                    loadDashboardData();
                } else {
                    alert("You do not have administrative privileges.");
                    window.location.href = '/';
                }
            } catch (e) {
                alert("Error verifying admin status.");
                window.location.href = '/';
            }
        });

        async function handleLogout() {
            await auth.signOut();
            localStorage.removeItem('bankxy_admin_token');
            localStorage.removeItem('bankxy_admin_email');
            window.location.href = '/';
        }

        async function loadDashboardData() {
            try {
                // Fetch secured admin endpoint
                const response = await fetch('/api/admin/dashboard_data', {
                    headers: { 'Authorization': `Bearer ${adminToken}` }
                });
                
                if (response.status === 401 || response.status === 403) {
                    alert("Unauthorized access. Logging out.");
                    handleLogout();
                    return;
                }

                const data = await response.json();
                updateUI(data);
            } catch (err) {
                console.error("Failed to load dashboard data", err);
            }
        }

        function updateUI(data) {
            // Update Top Stats
            document.getElementById('stat-users').innerText = data.total_users;
            document.getElementById('stat-conversions').innerText = data.total_conversions;
            document.getElementById('stat-errors').innerText = data.total_errors;
            
            const successRate = data.total_conversions > 0 
                ? Math.round(((data.total_conversions - data.total_errors) / data.total_conversions) * 100) 
                : 100;
            document.getElementById('stat-success-rate').innerText = `${successRate}%`;

            // Update Tables
            const actBody = document.getElementById('activity-table-body');
            actBody.innerHTML = '';
            data.recent_activity.forEach(act => {
                const isSuccess = act.status === 'success';
                const statusBadge = isSuccess 
                    ? `<span class="px-2 py-1 rounded bg-green-500/20 text-green-400 text-xs font-bold">SUCCESS</span>`
                    : `<span class="px-2 py-1 rounded bg-red-500/20 text-red-400 text-xs font-bold">FAILED</span>`;
                
                actBody.innerHTML += `
                    <tr class="hover:bg-slate-700/30">
                        <td class="px-4 py-3 whitespace-nowrap text-xs text-slate-400">${act.timestamp}</td>
                        <td class="px-4 py-3 font-medium text-white">${act.bank}</td>
                        <td class="px-4 py-3 text-xs truncate max-w-[150px]">${act.user_email}</td>
                        <td class="px-4 py-3 text-right">${statusBadge}</td>
                    </tr>
                `;
            });

            const errBody = document.getElementById('error-table-body');
            errBody.innerHTML = '';
            data.recent_errors.forEach(err => {
                errBody.innerHTML += `
                    <tr class="hover:bg-slate-700/30">
                        <td class="px-4 py-3 whitespace-nowrap text-xs text-slate-400">${err.timestamp}</td>
                        <td class="px-4 py-3 font-medium text-white">${err.bank}</td>
                        <td class="px-4 py-3 text-xs text-red-300 break-words max-w-[300px]">${err.error_message}</td>
                    </tr>
                `;
            });

            // Update Charts
            renderCharts(data.chart_data);
        }

        function renderCharts(chartData) {
            // Conversions Chart
            const ctxConv = document.getElementById('conversionChart').getContext('2d');
            if (convChartInstance) convChartInstance.destroy();
            
            convChartInstance = new Chart(ctxConv, {
                type: 'line',
                data: {
                    labels: chartData.dates,
                    datasets: [{
                        label: 'Conversions',
                        data: chartData.counts,
                        borderColor: '#06b6d4',
                        backgroundColor: 'rgba(6, 182, 212, 0.1)',
                        borderWidth: 2,
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        y: { beginAtZero: true, grid: { color: 'rgba(255, 255, 255, 0.05)' }, ticks: { color: '#94a3b8', stepSize: 1 } },
                        x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
                    }
                }
            });

            // Bank Usage Chart (Doughnut)
            const ctxBank = document.getElementById('bankChart').getContext('2d');
            if (bankChartInstance) bankChartInstance.destroy();
            
            bankChartInstance = new Chart(ctxBank, {
                type: 'doughnut',
                data: {
                    labels: chartData.banks.labels,
                    datasets: [{
                        data: chartData.banks.data,
                        backgroundColor: [
                            '#06b6d4', '#3b82f6', '#8b5cf6', '#ec4899', '#f59e0b', '#10b981'
                        ],
                        borderWidth: 0,
                        hoverOffset: 4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { position: 'right', labels: { color: '#e2e8f0', padding: 20 } }
                    },
                    cutout: '70%'
                }
            });
        }
    </script>
</body>
</html>
